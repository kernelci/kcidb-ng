# kcidb-rest interface workers
include:
  - path: ./dashboard/docker-compose.yml
services:
  kcidb-rest:
    image: ghcr.io/kernelci/kcidb-ng/kcidb-rest:latest
    env_file:
      - .env
    ports:
      - "443:443"
      - "8080:8080"
    volumes:
      - ./spool:/app/spool
      - ./certs:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - private
  # To disable JWT auth
  #    command: ["/usr/local/bin/kcidb-restd-rs","-j",""]
  ingester:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-kernelci}/${IMAGE_REPOSITORY:-dashboard}/dashboard-backend:${IMAGE_TAG:-latest}
    command:
      - poetry
      - run
      - python3
      - manage.py
      - monitor_submissions
      - --spool-dir
      - /app/spool
    env_file:
      - .env
    environment:
      SKIP_CRONJOBS: "True"
    volumes:
      - backend-data:${BACKEND_VOLUME_DIR:-/volume_data}
      - ${INGESTER_SPOOL_DIR:-../spool}:/app/spool
    restart: always
    networks:
      - private
      - public
    depends_on:
      - redis
    profiles: ["with_commands"]
  logspec-worker:
    build:
      context: .
      dockerfile: Dockerfile.logspec-worker
    env_file:
      - .env
    volumes:
      - ./spool:/app/spool
      - ./cache:/cache
      - ./state:/app/state
      - ./config:/app/config
    command: ["python", "/app/logspec_worker.py", "--spool-dir", "/app/spool", "--config-file", "/app/logspec_worker.yaml"]
    restart: unless-stopped
    networks:
      - private
    depends_on:
      db:
        condition: service_healthy
      dbinit:
        condition: service_completed_successfully
  db:
    image: postgres:17
    container_name: 'postgres'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s        # run every 10 s
      timeout: 5s          # fail if probe > 5 s
      retries: 5           # mark unhealthy after 5 failures
      start_period: 5s     # give Postgres a moment to boot    
    env_file:
      - .env
    volumes:
      - ./db:/var/lib/postgresql/data
    #ports:
    #  - "5432:5432"
    restart: unless-stopped
    profiles: ["self-hosted"]
    networks:
      - private
  dbinit:
    build:
      context: .
      dockerfile: Dockerfile.dbinit
    container_name: 'dbinit'
    env_file:
      - .env
    restart: "no"
    profiles: ["self-hosted"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private

